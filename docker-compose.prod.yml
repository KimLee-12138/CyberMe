services:
  # ── PostgreSQL + pgvector ──
  postgres:
    image: pgvector/pgvector:pg16
    container_name: cyberme-postgres
    environment:
      POSTGRES_USER: cyberme
      POSTGRES_PASSWORD: ${DB_PASSWORD:-change-this-password}
      POSTGRES_DB: cyberme
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cyberme"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ──
  redis:
    image: redis:7-alpine
    container_name: cyberme-redis
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── FastAPI ──
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: cyberme-api
    env_file:
      - .env.production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ── React + Nginx ──
  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: cyberme-web
    depends_on:
      - api
    restart: unless-stopped

  # ── Caddy HTTPS ──
  caddy:
    image: caddy:2-alpine
    container_name: cyberme-caddy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_logs:/var/log/caddy
    depends_on:
      - api
      - web
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  caddy_data:
  caddy_logs:
